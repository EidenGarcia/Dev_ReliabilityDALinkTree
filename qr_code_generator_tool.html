<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reliability DA · QR Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="styles.css">
<style>
  .calc-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(20,33,75,0.06);
    padding: 28px;
    animation: fadeUp 0.5s ease both;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
  }

  .brand {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }
  .brand img {
    width: min(200px, 60%);
    height: auto;
    border-radius: var(--radius);
    border: 1px solid rgba(20,33,75,0.06);
    box-shadow: 0 8px 24px rgba(20,33,75,0.06), var(--green-glow);
    background: rgba(20,33,75,0.06);
    padding: 4px;
  }

  /* Input area */
  .input-group { margin-bottom: 14px; }
  label.field-label {
    font-size: 0.79rem;
    color: var(--muted);
    display: block;
    margin-bottom: 7px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
  }

  .url-input {
    width: 100%;
    background: rgba(20,33,75,0.06);
    color: var(--ink);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: border 0.2s, box-shadow 0.2s, background 0.2s;
  }
  .url-input::placeholder { color: rgba(78,92,126,0.4); }
  .url-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(31,58,122,0.18);
    background: rgba(20,33,75,0.06);
  }

  /* Options row */
  .options-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .option-group label.field-label { margin-bottom: 5px; }
  select.url-input { cursor: pointer; }
  select.url-input option { background: #FFFFFF; }

  /* Generate button */
  .gen-btn {
    width: 100%;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--cyan), #14214B);
    color: #FFFFFF;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.03em;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(31,58,122,0.28);
    transition: all 0.18s;
    margin-bottom: 20px;
  }
  .gen-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 26px rgba(31,58,122,0.38); filter: brightness(1.05); }

  /* QR display area */
  #qr-wrap {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.3s ease both;
  }

  #qr-container {
    background: #ffffff;
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(20,33,75,0.06);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qr-meta {
    width: 100%;
    background: rgba(20,33,75,0.06);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 0.78rem;
    color: var(--muted);
    word-break: break-all;
    line-height: 1.5;
  }
  .qr-meta strong { color: var(--ink); font-weight: 600; }

  /* Action buttons below QR */
  .qr-actions {
    display: flex;
    gap: 10px;
    width: 100%;
  }
  .action-btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border);
    background: rgba(20,33,75,0.06);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
  }
  .action-btn:hover { background: rgba(20,33,75,0.06); color: var(--ink); border-color: rgba(20,33,75,0.06); }
  .action-btn.primary-action {
    background: rgba(121,169,65,0.1);
    border-color: rgba(121,169,65,0.3);
    color: #618A31;
  }
  .action-btn.primary-action:hover { background: rgba(121,169,65,0.18); border-color: rgba(121,169,65,0.5); }

  /* Error state */
  .error-msg {
    display: none;
    padding: 10px 13px;
    border-radius: var(--radius-sm);
    background: rgba(255,107,107,0.09);
    border: 1px solid rgba(255,107,107,0.3);
    color: #B42318;
    font-size: 0.85rem;
    margin-bottom: 12px;
    animation: fadeUp 0.2s ease both;
  }

  .card-footer {
    display: flex;
    justify-content: center;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--glass-border);
  }
  .footer-credit { color: var(--muted-2); font-size: 0.78rem; letter-spacing: 0.03em; }
</style>
</head>
<body>
<div class="page-wrapper">
  <div style="width:100%;max-width:560px;margin:0 auto;">

    <a class="back-link" href="tools.html">← Back to Tools</a>

    <header class="site-header">
      <h1>QR Generator</h1>
      <p class="lead">Generate QR codes for quick access to tools and reports.</p>
    </header>

    <div class="calc-card">

      <div class="brand">
        <img src="assets/images/luma-logo-white.png" alt="LUMA Logo">
      </div>

      <div class="meta">
        <span class="pill" id="lastUpdated">Last Updated: —</span>
      </div>

      <div class="divider"></div>

      <!-- Input -->
      <div class="input-group">
        <label class="field-label" for="userInput">URL or Text</label>
        <input class="url-input" id="userInput" type="text" placeholder="Paste a URL or enter any text…" autocomplete="off" spellcheck="false"/>
      </div>

      <!-- Options -->
      <div class="options-row">
        <div class="option-group">
          <label class="field-label" for="qrSize">QR Size</label>
          <select class="url-input" id="qrSize">
            <option value="180">Small (180px)</option>
            <option value="220" selected>Medium (220px)</option>
            <option value="300">Large (300px)</option>
            <option value="400">Extra Large (400px)</option>
          </select>
        </div>
        <div class="option-group">
          <label class="field-label" for="qrLevel">Error Correction</label>
          <select class="url-input" id="qrLevel">
            <option value="L" selected>Low (L)</option>
            <option value="M">Medium (M)</option>
            <option value="Q">Quartile (Q)</option>
            <option value="H">High (H)</option>
          </select>
        </div>
      </div>

      <!-- Error message -->
      <div class="error-msg" id="errorMsg"></div>

      <!-- Generate -->
      <button class="gen-btn" onclick="generateQR()">Generate QR Code</button>

      <!-- QR output -->
      <div id="qr-wrap">
        <div id="qr-container"></div>
        <div class="qr-meta" id="qrMeta"></div>
        <div class="qr-actions">
          <button class="action-btn primary-action" onclick="downloadQR()">⬇ Download PNG</button>
          <button class="action-btn" onclick="copyQRText()">⎘ Copy Text</button>
          <button class="action-btn" onclick="clearQR()">✕ Clear</button>
        </div>
      </div>

      <div class="card-footer">
        <span class="footer-credit">Developed by Eiden O. Garcia Torres</span>
      </div>

    </div>
  </div>
</div>

<script>
  // Last updated date
  (function(){
    const fixedDate = new Date('2025-08-21T20:40');
    const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric', hour:'numeric', minute:'numeric', hour12:true };
    document.getElementById('lastUpdated').textContent = 'Last Updated: ' + fixedDate.toLocaleDateString('en-US', opts);
  })();

  const levelMap = { L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M, Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H };

  function showError(msg) {
    const box = document.getElementById('errorMsg');
    box.textContent = msg;
    box.style.display = 'block';
  }
  function clearError() {
    const box = document.getElementById('errorMsg');
    box.textContent = '';
    box.style.display = 'none';
  }

  function generateQR() {
    clearError();
    const container = document.getElementById('qr-container');
    const wrap      = document.getElementById('qr-wrap');
    const data      = document.getElementById('userInput').value.trim();
    const size      = parseInt(document.getElementById('qrSize').value);
    const level     = document.getElementById('qrLevel').value;

    if (!data) {
      showError('Please enter a URL or text before generating.');
      return;
    }
    if (data.length > 2953) {
      showError('Text is too long for a QR code (max ~2953 characters at Low correction).');
      return;
    }

    container.innerHTML = '';

    try {
      new QRCode(container, {
        text: data,
        width: size,
        height: size,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: levelMap[level] || QRCode.CorrectLevel.L
      });

      // Meta info
      const label = data.length > 60 ? data.slice(0, 57) + '…' : data;
      document.getElementById('qrMeta').innerHTML =
        `<strong>Content:</strong> ${label}<br>
         <strong>Characters:</strong> ${data.length} &nbsp;·&nbsp;
         <strong>Size:</strong> ${size}×${size}px &nbsp;·&nbsp;
         <strong>Error correction:</strong> ${level}`;

      wrap.style.display = 'flex';
    } catch(e) {
      showError('Could not generate QR code. The text may contain unsupported characters.');
    }
  }

  function downloadQR() {
    const canvas = document.querySelector('#qr-container canvas');
    const img    = document.querySelector('#qr-container img');
    const data   = document.getElementById('userInput').value.trim();
    const filename = 'qr_' + (data.length > 20 ? data.slice(0,20) : data).replace(/[^a-zA-Z0-9]/g,'_') + '.png';

    if (canvas) {
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } else if (img) {
      // Fallback: open image in new tab if canvas not available
      window.open(img.src, '_blank');
    }
  }

  function copyQRText() {
    const data = document.getElementById('userInput').value.trim();
    navigator.clipboard.writeText(data).then(() => {
      const btn = event.target;
      const orig = btn.textContent;
      btn.textContent = '✓ Copied!';
      btn.style.color = '#618A31';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1800);
    }).catch(() => {});
  }

  function clearQR() {
    document.getElementById('qr-container').innerHTML = '';
    document.getElementById('qr-wrap').style.display = 'none';
    document.getElementById('userInput').value = '';
    document.getElementById('userInput').focus();
    clearError();
  }

  // Enter key triggers generate
  document.getElementById('userInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateQR();
  });

  // Re-generate on option change if QR already showing
  ['qrSize','qrLevel'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      if (document.getElementById('qr-wrap').style.display === 'flex') generateQR();
    });
  });
</script>
</body>
</html>
