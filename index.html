  <link rel="stylesheet" href="styles.css">
  <style>
    .home-links { display: grid; grid-template-columns: 1fr; gap: 10px; }

    a.btn.nav-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      justify-content: flex-start;
      padding: 16px 20px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 500;
    }

    a.btn.nav-btn .btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1rem;
      background: rgba(20,33,75,0.06);
    }

    a.btn.nav-btn::after { display: none; }

    a.btn.nav-btn .btn-arrow {
      margin-left: auto;
      color: var(--muted-2);
      font-size: 0.85rem;
      transition: transform 0.18s ease, color 0.18s ease;
    }

    a.btn.nav-btn:hover .btn-arrow {
      transform: translateX(3px);
      color: var(--ink);
    }

    /* Safety button override */
    a.btn.safety {
      background: rgba(240,165,0,0.12);
      color: #8A5B00;
      border: 1px solid rgba(240,165,0,0.45);
      font-weight: 600;
    }

    a.btn.safety:hover {
      background: rgba(240,165,0,0.18);
      border-color: rgba(240,165,0,0.65);
      box-shadow: 0 4px 20px rgba(240,165,0,0.20);
    }

    a.btn.safety .btn-icon {
      background: rgba(240,165,0,0.15);
    }
  </style>
</head>
